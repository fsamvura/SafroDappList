name: Validate

on:
  pull_request:
    paths:
      - "apps/**"
      - "schemas/**"
      - "scripts/**"
      - "registry.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/validate.yml"
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "schemas/**"
      - "scripts/**"
      - "registry.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate manifests, logos, and registry
        run: npm run validate
